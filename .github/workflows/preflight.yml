name: pre-flight

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run pre-flight
        # Drives markdownlint, frontmatter validation (layer-1 + product
        # surfaces), link integrity, plugin/marketplace manifest validation,
        # eval-record lint, and shellcheck (scripts/ + product/installer/).
        # Manifest and eval checks skip cleanly until those artifacts exist.
        run: bash scripts/preflight.sh
